<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passkey Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.12); padding: 2rem; width: 360px; }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #111; }
    h2 { font-size: 1rem; margin-bottom: 1rem; color: #333; }
    input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: .6rem .8rem; font-size: .95rem; margin-bottom: .8rem; }
    button { width: 100%; padding: .65rem; border: none; border-radius: 6px; font-size: .95rem; cursor: pointer; margin-bottom: .5rem; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .divider { text-align: center; margin: .75rem 0; color: #9ca3af; font-size: .85rem; }
    #msg { margin-top: .75rem; font-size: .85rem; padding: .5rem .75rem; border-radius: 5px; display: none; }
    #msg.error { background: #fee2e2; color: #b91c1c; display: block; }
    #msg.success { background: #dcfce7; color: #166534; display: block; }
    .hidden { display: none !important; }
    #user-badge { font-size: .85rem; color: #6b7280; margin-bottom: 1rem; }
    #msg-home { margin-top: .75rem; font-size: .85rem; padding: .5rem .75rem; border-radius: 5px; display: none; }
    #msg-home.error { background: #fee2e2; color: #b91c1c; display: block; }
    #msg-home.success { background: #dcfce7; color: #166534; display: block; }
    .passkeys-section { margin-top: 1.25rem; }
    .passkeys-section h2 { font-size: .9rem; font-weight: 600; color: #374151; margin-bottom: .6rem; }
    .passkey-item { display: flex; align-items: center; justify-content: space-between; padding: .5rem .6rem; border: 1px solid #e5e7eb; border-radius: 6px; margin-bottom: .4rem; }
    .passkey-info { flex: 1; min-width: 0; }
    .passkey-label { font-size: .85rem; font-weight: 500; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .passkey-meta { font-size: .75rem; color: #9ca3af; margin-top: .15rem; }
    .btn-delete { width: auto; padding: .3rem .65rem; font-size: .8rem; background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; border-radius: 5px; margin-bottom: 0; flex-shrink: 0; margin-left: .5rem; }
    .btn-delete:hover { background: #fecaca; }
    .passkeys-empty { font-size: .82rem; color: #9ca3af; text-align: center; padding: .5rem 0; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Login view -->
    <div id="view-login">
      <h1>Passkey Demo</h1>
      <input id="username" type="text" placeholder="Username" autocomplete="username" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      <button class="btn-primary" onclick="login()">Sign in with password</button>
      <div class="divider">or</div>
      <button class="btn-secondary" onclick="loginWithPasskey()">Sign in with passkey</button>
      <div id="msg"></div>
    </div>

    <!-- Home view -->
    <div id="view-home" class="hidden">
      <h1>Welcome</h1>
      <p id="user-badge"></p>
      <button class="btn-secondary" onclick="registerPasskey()">Register a passkey</button>
      <button class="btn-danger" onclick="logout()">Sign out</button>
      <div id="msg-home"></div>
      <div class="passkeys-section">
        <h2>Your passkeys</h2>
        <div id="passkeys-list"><p class="passkeys-empty">Loading…</p></div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
